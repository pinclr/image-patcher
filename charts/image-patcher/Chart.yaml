apiVersion: v2
name: image-patcher
description: Helm chart for image-patch-operator, a Kubernetes operator that builds patched container images from ImagePatch CRs using Kaniko.
type: application
version: 0.3.51
appVersion: "v0.1.56"
kubeVersion: ">=1.21.0-0"
home: https://github.com/pinclr/image-patcher
keywords:
  - kaniko
  - image
  - operator
  - kubebuilder
sources:
  - https://github.com/pinclr/image-patcher
maintainers:
  - name: pinclr
    email: robert@pinclr.com
    url: https://github.com/pinclr
annotations:
  # Artifact Hub renders these on the package page.
  # https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/maintainers: |
    - name: Robert Wen
      email: robert@pinclr.com
  artifacthub.io/links: |
    - name: source
      url: https://github.com/pinclr/image-patcher
    - name: support
      url: https://github.com/pinclr/image-patcher/issues
  # Images listed here are scanned for vulnerabilities by Artifact Hub.
  artifacthub.io/images: |
    - name: image-patcher-operator
      image: ghcr.io/pinclr/image-patcher-operator:v0.1.56
  artifacthub.io/changes: |
    - kind: changed
      description: kaniko.buildAptMirror -- revert to per-command -o Dir::Etc::SourceList flags on the spec.apt.install RUN, keeping temp sources file scoped to that single RUN and /etc/apt untouched
