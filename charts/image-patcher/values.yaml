# Default values for image-patcher chart.

# nameOverride / fullnameOverride control resource naming.
# fullnameOverride defaults to "image-patch-operator" so resource names match
# the controller image and the legacy kustomize deployment.
nameOverride: ""
fullnameOverride: "image-patch-operator"

# Controller manager image.
# Final image = "{registry}/{repository}:{tag}".
# tag falls back to .Chart.AppVersion when empty.
# image.registry is REQUIRED (enforced by values.schema.json) so we never
# accidentally pull from docker.io.
image:
  registry: ""
  repository: image-patcher-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Controller runtime configuration. Each field is rendered into a container env var.
config:
  # DEFAULT_IMAGE_REGISTRY: registry used when an ImagePatch does not set spec.targetImage.
  defaultImageRegistry: ""
  # buildNamespace: the namespace in which the controller creates Kaniko
  # build Jobs and their supporting ConfigMaps — chart-level, set once at
  # deploy time. The build namespace is decoupled from the ImagePatch CR's
  # own namespace: CRs may live anywhere callers choose, but every Job
  # lands here.
  #
  # Default is image-patch-system (the release namespace, asserted by the
  # chart so it is guaranteed to exist). Empty falls back to the same
  # canonical default inside the controller; explicitly set to any other
  # namespace to land Jobs there (e.g. a dedicated build ns like "oms").
  #
  # When buildNamespace differs from a CR's namespace, cross-namespace
  # OwnerReferences are not allowed by Kubernetes, so the controller omits
  # SetControllerReference and labels the Job / ConfigMap with
  # imagepatch.source.name / imagepatch.source.namespace for traceability —
  # cleanup on CR deletion becomes the user's responsibility.
  buildNamespace: "image-patch-system"

# Kaniko executor image, injected as KANIKO_IMAGE_NAME env var.
# Override registry for air-gapped or mirrored environments.
kaniko:
  image:
    registry: gcr.io
    repository: kaniko-project/executor
    tag: v1.23.2

  # Build cache: container registry where Kaniko caches the result of each
  # intermediate RUN layer. When enabled, the controller passes
  # --cache=true --cache-repo=<repo> to Kaniko, with <repo> automatically
  # derived as `<config.defaultImageRegistry>/kaniko-build-cache`. The
  # /kaniko-build-cache suffix is required so the cache-repo path has at
  # least two segments -- Harbor (and similar OCI registries) reject
  # manifest writes to a single-segment path with 400. Multi-node safe.
  buildCache:
    enabled: false

  # Chart-wide defaults for Kaniko snapshot / cache tuning. Each field on
  # an individual ImagePatch's spec.buildOptions overrides the matching
  # field here; empty here means "let Kaniko keep its own default" (the
  # controller omits the corresponding flag entirely). Trade-offs are
  # non-obvious; see ImagePatchSpec.BuildOptions godoc.
  buildOptions:
    # Empty | full | redo | time. Empty = Kaniko's own default (full).
    # redo: typically 5-10x faster than full on large bases (>1GB), at a
    # small risk of missing changes from unusual write patterns (mount
    # tricks, cross-overlay hardlinks). Try this before reaching for
    # `time`, which skips content hashing entirely.
    snapshotMode: ""
    # When true, Kaniko takes ONE snapshot at the end instead of after
    # each RUN. Faster on first build but BREAKS per-RUN build-cache
    # reuse on subsequent builds. Set per-CR for one-off builds rather
    # than chart-wide unless you don't care about incremental caching.
    singleSnapshot: false
    # Paths to skip during snapshotting (each becomes --ignore-path).
    # Cuts both snapshot scan time and final image size. Common entries:
    # /var/cache/apt, /var/lib/apt/lists, /root/.cache/pip, /tmp.
    # Kaniko already skips /proc /sys /dev /var/run by default.
    ignorePaths: []
    # Maximum age for cached build layers (Go duration). Kaniko default
    # is 336h (14 days). Empty keeps the Kaniko default.
    cacheTTL: ""

  # Pull-through mirrors for Kaniko base image fetches. Each entry maps
  # an upstream registry host to a mirror host; the controller emits one
  # --registry-map=<target>=<mirror> arg per entry to the Kaniko Job.
  # Use this when build pods cannot reach the upstream directly
  # (air-gapped clusters, blocked egress, or just slow public
  # endpoints) and a pull-through cache is available. Only affects
  # base image pulls -- the push --destination and the
  # --cache-repo are untouched, so pushes still go to the real
  # target registry. Empty (the default) leaves Kaniko's pull
  # behavior unchanged.
  #
  # `docker.io` is silently rewritten to `index.docker.io` before
  # being passed to Kaniko, because go-containerregistry normalizes
  # refs without a registry prefix (e.g. `ubuntu:24.04`) to
  # `index.docker.io/...` -- a literal `docker.io` map key would
  # never match. Other hosts pass through unchanged.
  registryMap: {}
    # Example -- a placeholder that does not resolve, override per env:
    # docker.io: docker.mirror.example.invalid

  # Build-only apt mirror. The controller drives apt-get update/install
  # via `-o Dir::Etc::SourceList=/tmp/build-sources.list -o Dir::Etc::SourceParts=/dev/null`
  # inside a single RUN, so /etc/apt is never touched and the produced
  # image carries exactly the apt sources its base shipped (no internal
  # mirror baked in). Use this to speed up apt-get install on clusters
  # where archive.ubuntu.com is slow or unreachable. Orthogonal to the
  # per-CR `spec.apt.mirror`, which is the user opting in to BAKE a
  # mirror INTO the image's /etc/apt/sources.list; both may be set at
  # once. Empty (the default) leaves the build to read the base image's
  # stock apt sources.
  #
  # Example -- public NetEase (163) Ubuntu mirror, reachable from most
  # China clusters:
  #   buildAptMirror: http://mirrors.163.com/ubuntu
  buildAptMirror: ""

  # Chart-wide build-time PyPI mirror. When set, pip install inside
  # kaniko uses --index-url <mirror> --trusted-host <host>, accelerating
  # package downloads without baking any pip config into the produced
  # image (the flag is passed inline, no pip.conf or environment variable
  # is written). Orthogonal to any pip.conf the user bakes in via
  # fromImages or shell steps. Empty (the default) leaves pip pointing at
  # the upstream pypi.org index.
  #
  # Example -- Tsinghua University TUNA mirror, widely reachable from
  # China clusters:
  #   buildPypiMirror: https://pypi.tuna.tsinghua.edu.cn/simple
  buildPypiMirror: ""

  # Resource requirements applied to every Kaniko build container.
  # ephemeral-storage is the critical one: Kaniko extracts the base
  # image into the container rootfs to execute RUN/COPY, so transient
  # on-disk usage during a build is roughly:
  #
  #   extracted base (~1.5-2x the compressed size in the registry)
  #   + apt/pip install output (1-3 GiB typical, more for ML stacks)
  #   + Kaniko snapshot intermediate tarballs (a few GiB)
  #   + /tmp scratch
  #
  # Rules of thumb for the request:
  #   small base (alpine, distroless, busybox)       ->  5 GiB
  #   ubuntu / debian + light packages               -> 10 GiB
  #   ML stacks (PyTorch, TensorFlow + CUDA runtime) -> 30 GiB
  #   large CUDA dev images (~20 GB final size)      -> 50 GiB
  #
  # Default 30Gi covers typical ML/CUDA workloads (the operator's main
  # use case); override per environment for unusually small or large
  # builds. Without a request, the scheduler is blind to this demand
  # and may stack builds onto a disk-tight node, triggering kubelet
  # disk-pressure eviction that takes unrelated pods down too.
  #
  # Limits are intentionally unset by default -- builds vary widely
  # enough that a global ceiling would silently kill legitimate work.
  # Set per-CR via a future BuildOptions extension if needed.
  #
  # Standard corev1.ResourceRequirements shape; serialized to JSON and
  # passed to the controller as the KANIKO_RESOURCES env var.
  resources:
    requests:
      ephemeral-storage: 30Gi
    limits: {}

replicaCount: 3

leaderElection:
  enabled: true

# Controller pod resources. Memory sizing accounts for the cluster-wide
# informer caches the manager holds for ImagePatch + Job + ConfigMap, plus
# the docker config registry client used by the dedup short-circuit.
resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 10m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # Whether to create the controller's RBAC (ClusterRole + ClusterRoleBinding + leader-election Role).
  create: true
  # Whether to create the imagepatch-{admin,editor,viewer} aggregated ClusterRoles
  # for end users (not consumed by the controller itself).
  aggregatedRoles:
    create: true

metrics:
  enabled: true
  port: 8443
  service:
    type: ClusterIP
  # ServiceMonitor lets Prometheus Operator auto-discover and scrape the
  # controller's :8443/metrics endpoint. Requires monitoring.coreos.com CRDs
  # (kube-prometheus-stack or prometheus-operator) installed in the cluster.
  serviceMonitor:
    enabled: false
    # Render the ServiceMonitor in a different namespace than the chart
    # release. Default (empty) uses .Release.Namespace.
    namespace: ""
    # Extra labels to add to the ServiceMonitor metadata. kube-prometheus-stack
    # configures Prometheus with a serviceMonitorSelector like
    # `release: kube-prometheus-stack`, so the ServiceMonitor needs that label
    # to be discovered. Check your Prometheus CR's spec.serviceMonitorSelector
    # and set this accordingly. Empty by default to avoid making assumptions.
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    # Bind the controller's metrics-reader ClusterRole to the Prometheus
    # server's ServiceAccount so its bearer token is authorized to GET
    # /metrics. Defaults match kube-prometheus-stack conventional names.
    prometheus:
      serviceAccount:
        name: prometheus-kube-prometheus-prometheus
        namespace: monitoring
    # The metrics endpoint serves a controller-runtime self-signed cert by
    # default; insecureSkipVerify is the working default. Switch to a CA
    # bundle once cert-manager-issued certs are wired up (see the
    # [METRICS-WITH-CERTS] TODO in cmd/main.go).
    tlsConfig:
      insecureSkipVerify: true

# Healthcheck (canary) CronJob. When enabled, walks the matrix of
# spec.buildOptions disable flags on a schedule and asserts the
# observable behavior of every cache tier (controller dedup short-
# circuit and Kaniko build-layer cache). Verifies the full pipeline
# (base pull, Dockerfile generation, Kaniko build, registry push)
# plus the cache machinery, without depending on external package
# mirrors.
#
# Test sequence per tick (per base image, sequential):
#   first      caches on, fresh hash         expect: build runs, no dedup hit
#   hit        same spec as first            expect: dedup HIT, no Job
#   nobcache   disableBuildCache             expect: no hit, build runs
#   nolayer    +disableBuildLayerCache       expect: --cache=true absent in Kaniko args
#
# Total CRs per tick = 4 cases * len(baseImages). Per-case user tags
# include the base image identifier (last segment of the ref, ':' ->
# '-'), so metric and registry cardinality remain bounded to one tag
# per (base, case) pair. Stable across ticks -- only the dedup tags
# (<repo>:dedup-<hash>) accumulate, one per tick per base.
#
# Results surface through controller metrics (builds_total with the
# image label suffixed by base+case) and the per-tick PASS/FAIL summary
# in the Job log. Successful runs delete their CRs immediately; failed
# runs are retained for failureRetentionSeconds for debug.
#
# Each tick uses a fresh timestamp in the shell RUN so the spec hash
# is unique per tick (case-1 always builds, case-2 always tests the
# hit it just wrote).
healthcheck:
  enabled: false
  # Default: hourly. With the multi-base matrix, each tick runs 4
  # cases x len(baseImages) sequentially (3 real builds + 1 short-
  # circuit per base). Hourly is conservative -- envs that want
  # faster metric movement on dashboards should override to "*/10 *
  # * * *" (see examples/values-ysyb.yaml). Per-tick dedup tag
  # writes = 1 per base per tick, set retention on the target repo
  # accordingly.
  schedule: "0 * * * *"
  # Tiny image with kubectl + /bin/sh. Pinned to a kubectl version
  # within one minor of the cluster API server to be safe. The default
  # uses Rancher's public mirror because the previously-conventional
  # `bitnami/kubectl` tag was retired when Bitnami moved free images
  # to bitnamilegacy/. Override for air-gapped clusters.
  image: rancher/kubectl:v1.31.0
  # Base images to exercise. Each tick runs the full 4-case matrix
  # against every entry, so total per-tick builds = 4 * len(list).
  # Each base produces a distinct metric image label so dashboards
  # can compare per-base behavior (e.g. apt mirror perf on noble vs
  # jammy). Pick refs reachable from the cluster's build pods --
  # the docker.io default below works only on clusters that can pull
  # from docker.io; air-gapped envs should override with internal
  # mirror refs (see examples/values-ysyb.yaml).
  baseImages:
    - ubuntu:22.04
  # targetImage is used as a stem; the probe writes per-case stable
  # tags by appending "-<baseId>-<case>" where <baseId> is the base
  # ref's last segment with ':' replaced by '-' (e.g.
  # "ubuntu-22.04-latest"). The full per-case tag is therefore
  # <targetImage>-<baseId>-<case>. Leave targetImage empty to fall
  # back to DEFAULT_IMAGE_REGISTRY-derived naming inside the controller.
  targetImage: ""
  # Per-case polling timeout. Exceeded for any single case ->
  # [FAIL] for that case; the tick continues with subsequent cases
  # and exits nonzero at the end if any failed.
  caseTimeoutSeconds: 300
  # Failed canary CRs are kept for this long for debugging, then GC'd
  # by the next tick.
  failureRetentionSeconds: 21600
  # Upper bound on the probe Job's own runtime, sized for 4 cases each
  # potentially hitting caseTimeoutSeconds plus startup / cleanup.
  activeDeadlineSeconds: 1800

# Grafana dashboard provisioning.
# When enabled, the chart renders a ConfigMap carrying the bundled
# dashboard JSON (charts/image-patcher/dashboards/image-patcher.json).
# kube-prometheus-stack's grafana-sc-dashboard sidecar watches all
# namespaces for the configured label and imports the dashboard
# automatically -- no Grafana restart, no manual import. The label
# defaults (grafana_dashboard=1) match kube-prometheus-stack out of
# the box; override if your sidecar is configured differently.
dashboards:
  enabled: false
  label:
    key: grafana_dashboard
    value: "1"
  # If set, written as `grafana_folder: <value>` annotation -- some
  # sidecar configs use this to place the dashboard in a named folder.
  # Leave empty to land in the default folder.
  folderAnnotation: ""

# Registry credentials, auto-populated into a Secret by the chart.
#
# General-purpose creds: Kaniko uses this one Secret for every registry
# operation in a build -- base-image pull, layer-cache pull/push, and the
# final push -- and the dedup client reuses it for HEAD/retag. It is not
# push-only; whether an entry serves pull or push just depends on whether
# that registry is the source or the destination.
#
# List one entry per registry. The chart base64-encodes each
# username/password into a docker config.json "auths" map and creates
# the Secret for you -- you no longer hand-create image-registry-secret
# with `kubectl create secret`. Different source/target registries can
# each carry their own entry.
#
# The Secret is always named image-registry-secret with key config.json
# (the controller hard-codes the name for the build Job's docker-config
# mount). When config.buildNamespace differs from the release namespace,
# the chart renders an identical Secret into both so Kaniko (build ns)
# and the dedup client (release ns) both find it.
#
# Leave empty ([]) to keep the legacy behaviour: provision
# image-registry-secret out-of-band yourself.
#
# NOTE: these are plaintext creds in values -- supply them from a secret
# values file / CI secret store, not a committed values.yaml.
registryCredentials: []
#  - registry: registry.luna.ogpu.cloud
#    username: robot$ci
#    password: s3cret
#  - registry: myacr.azurecr.io
#    username: ci-bot
#    password: hunter2

# Content-addressed build dedup. When on, the controller computes a
# deterministic hash of every ImagePatch spec and:
#
#   1. Before creating a Kaniko Job, HEADs <repo>:dedup-<hash> in
#      the same repo as the user destination. On hit, the existing
#      manifest is retagged under the user tag (pure manifest copy,
#      same repo = blob scope shared) and the CR is marked Succeeded
#      with Status.DedupHit=true. No Job is created.
#   2. On miss, the build runs as normal and Kaniko pushes BOTH the
#      user tag AND the dedup tag in one shot (multi-destination
#      push). The next build with the same spec hits the fast path.
#
# The dedup tag is purely content-addressed -- the user tag is NOT
# part of it. So two CRs with identical spec but different user tags
# (e.g. per-instance suffixes) converge on the same dedup tag and
# share the short-circuit.
#
# Same repo on both sides is load-bearing for step 2: cross-repo would
# fail with MANIFEST_BLOB_UNKNOWN because blob scope is per-repo.
#
# The controller talks to the registry directly using the same
# dockerconfigjson Kaniko mounts. The chart mounts that Secret
# (image-registry-secret) into the controller pod at /registry/.docker.
# Cross-namespace: the Secret must exist in the release namespace
# ({{ .Release.Namespace }}) and, when the build namespace differs (e.g.
# controller in image-patch-system, builds in oms), in that namespace
# too. When registryCredentials is set the chart renders it into both;
# otherwise provision an identical Secret in each yourself.
#
# Default on (Kaniko-side dedup-write is ~free; the short-circuit only
# fires when the controller can reach the registry). Flip to false as
# a kill switch if registry retention / quota / scanning rules can't
# cope with the extra tags yet, or if you can't yet provision the
# secret in the release namespace.
dedup:
  enabled: true
  # The Secret holding docker config JSON is image-registry-secret with
  # key config.json -- both fixed (the controller hard-codes the name for
  # the build Job's docker-config mount). Populate it via registryCredentials
  # above; when that is empty, provision image-registry-secret out-of-band.

# Extra args appended to the controller command line.
extraArgs: []
# Extra environment variables appended to the controller container.
extraEnv: []
