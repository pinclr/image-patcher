# Default values for image-patcher chart.

# nameOverride / fullnameOverride control resource naming.
# fullnameOverride defaults to "image-patch-operator" so resource names match
# the controller image and the legacy kustomize deployment.
nameOverride: ""
fullnameOverride: "image-patch-operator"

# Controller manager image.
# Final image = "{registry}/{repository}:{tag}".
# tag falls back to .Chart.AppVersion when empty.
# image.registry is REQUIRED (enforced by values.schema.json) so we never
# accidentally pull from docker.io.
image:
  registry: ""
  repository: image-patch-system/image-patch-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Controller runtime configuration. Each field is rendered into a container env var.
config:
  # DEFAULT_IMAGE_REGISTRY: registry used when an ImagePatch does not set spec.targetImage.
  defaultImageRegistry: ""
  # buildNamespace: when set, the controller creates the Kaniko build Job and
  # its supporting ConfigMap in this namespace instead of the ImagePatch CR's
  # own namespace. The chart-managed pull-cache PVC is also placed here so
  # build pods can mount it. Cross-namespace owner references are not allowed
  # by Kubernetes, so when buildNamespace differs from the CR's namespace the
  # controller omits the OwnerReference and labels the Job / ConfigMap with
  # imagepatch.source.name / imagepatch.source.namespace for traceability —
  # cleanup on CR deletion becomes the user's responsibility.
  #
  # Empty (default) preserves the legacy behavior: Job + ConfigMap created in
  # the same namespace as the ImagePatch CR, owner-referenced for automatic GC.
  buildNamespace: ""

# Kaniko executor image, injected as KANIKO_IMAGE_NAME env var.
# Override registry for air-gapped or mirrored environments.
kaniko:
  image:
    registry: gcr.io
    repository: kaniko-project/executor
    tag: v1.23.2

  # Pull cache: PVC mounted into every Kaniko build Job at pullCache.mountPath.
  # The controller passes --cache-dir=<mountPath> so pulled *base-image*
  # layers persist across builds. PVC lifecycle is tied to the chart release,
  # not any individual ImagePatch CR.
  #
  # The chart-managed PVC is created as ReadWriteMany so multiple build Jobs
  # (one per concurrently reconciled ImagePatch CR) can share it across
  # nodes. storageClassName must therefore reference a class that supports
  # RWX -- CephFS, NFS, Azure Files, EFS, etc. To bring your own PVC (any
  # access mode you want), set existingClaim and the chart will skip
  # creating one.
  pullCache:
    enabled: false
    # If set, the controller mounts this existing PVC (chart skips creating one).
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    mountPath: /cache
    # Cleanup: periodic CronJob that deletes cache files older than
    # maxAgeDays (by mtime). Kaniko never evicts entries itself, so the
    # PVC fills up over time. The Job mounts the same PVC, runs in the
    # same namespace, and only exists when pullCache.enabled is true.
    cleanup:
      enabled: false
      # Cron expression. Default: daily at 03:15 (off-peak).
      schedule: "15 3 * * *"
      # Delete cache files whose mtime is older than this many days.
      maxAgeDays: 30
      # Any image with /bin/sh + find is fine; busybox is ~5MB.
      image: busybox:1.36
      # Forbid: skip the run if a previous one is still cleaning.
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 1

  # Build cache: container registry where Kaniko caches the result of each
  # intermediate RUN layer. Independent from pullCache above; both can be
  # enabled simultaneously. When enabled, the controller passes
  # --cache=true --cache-repo=<repo> to Kaniko. Multi-node safe.
  buildCache:
    enabled: false
    repo: ""
    # Example: registry.luna.ogpu.cloud/image-patch-system/kaniko-build-cache

replicaCount: 1

leaderElection:
  enabled: true

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # Whether to create the controller's RBAC (ClusterRole + ClusterRoleBinding + leader-election Role).
  create: true
  # Whether to create the imagepatch-{admin,editor,viewer} aggregated ClusterRoles
  # for end users (not consumed by the controller itself).
  aggregatedRoles:
    create: true

metrics:
  enabled: true
  port: 8443
  service:
    type: ClusterIP
  # ServiceMonitor lets Prometheus Operator auto-discover and scrape the
  # controller's :8443/metrics endpoint. Requires monitoring.coreos.com CRDs
  # (kube-prometheus-stack or prometheus-operator) installed in the cluster.
  serviceMonitor:
    enabled: false
    # Render the ServiceMonitor in a different namespace than the chart
    # release. Default (empty) uses .Release.Namespace.
    namespace: ""
    # Extra labels to add to the ServiceMonitor metadata. kube-prometheus-stack
    # configures Prometheus with a serviceMonitorSelector like
    # `release: kube-prometheus-stack`, so the ServiceMonitor needs that label
    # to be discovered. Check your Prometheus CR's spec.serviceMonitorSelector
    # and set this accordingly. Empty by default to avoid making assumptions.
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    # Bind the controller's metrics-reader ClusterRole to the Prometheus
    # server's ServiceAccount so its bearer token is authorized to GET
    # /metrics. Defaults match kube-prometheus-stack conventional names.
    prometheus:
      serviceAccount:
        name: prometheus-kube-prometheus-prometheus
        namespace: monitoring
    # The metrics endpoint serves a controller-runtime self-signed cert by
    # default; insecureSkipVerify is the working default. Switch to a CA
    # bundle once cert-manager-issued certs are wired up (see the
    # [METRICS-WITH-CERTS] TODO in cmd/main.go).
    tlsConfig:
      insecureSkipVerify: true

# Healthcheck (canary) CronJob. When enabled, submits a single noop
# ImagePatch on a schedule and polls its status until terminal. Exercises
# the full pipeline (base pull, Dockerfile generation, Kaniko build,
# registry push, RWX pull-cache mount) without depending on external
# package mirrors. Results surface through the existing controller
# metrics -- builds_total / build_duration_seconds / failure_reason on
# CRs whose image label matches the targetImage path.
#
# Successful runs delete their CR immediately; failed runs are retained
# for failureRetentionSeconds so the build Job + Pod logs can be
# inspected before the next tick garbage-collects them.
healthcheck:
  enabled: false
  # Default: every 10 minutes. Each run costs one short build slot.
  schedule: "*/10 * * * *"
  # Tiny image with kubectl + /bin/sh. Pinned to a kubectl version
  # within one minor of the cluster API server to be safe. The default
  # uses Rancher's public mirror because the previously-conventional
  # `bitnami/kubectl` tag was retired when Bitnami moved free images
  # to bitnamilegacy/. Override for air-gapped clusters.
  image: rancher/kubectl:v1.31.0
  # noop test case spec. baseImage is intentionally small and ubiquitous
  # so the canary doesn't depend on package mirrors. targetImage uses a
  # stable tag, overwritten each run, so the registry doesn't accumulate
  # canary artifacts. Leave targetImage empty to fall back to
  # DEFAULT_IMAGE_REGISTRY-derived naming inside the controller.
  baseImage: alpine:3.20
  targetImage: ""
  # Polling timeout for the submitted CR to reach Succeeded/Failed.
  # Exceeded -> the probe Job exits with code 2 (TIMEOUT distinct from
  # build failure code 1).
  timeoutSeconds: 600
  # Failed canary CRs are kept for this long for debugging, then GC'd
  # by the next tick.
  failureRetentionSeconds: 21600
  # Upper bound on the probe Job's own runtime, slightly above
  # timeoutSeconds to allow for startup / cleanup.
  activeDeadlineSeconds: 900

# Grafana dashboard provisioning.
# When enabled, the chart renders a ConfigMap carrying the bundled
# dashboard JSON (charts/image-patcher/dashboards/image-patcher.json).
# kube-prometheus-stack's grafana-sc-dashboard sidecar watches all
# namespaces for the configured label and imports the dashboard
# automatically -- no Grafana restart, no manual import. The label
# defaults (grafana_dashboard=1) match kube-prometheus-stack out of
# the box; override if your sidecar is configured differently.
dashboards:
  enabled: false
  label:
    key: grafana_dashboard
    value: "1"
  # If set, written as `grafana_folder: <value>` annotation -- some
  # sidecar configs use this to place the dashboard in a named folder.
  # Leave empty to land in the default folder.
  folderAnnotation: ""

# Extra args appended to the controller command line.
extraArgs: []
# Extra environment variables appended to the controller container.
extraEnv: []
