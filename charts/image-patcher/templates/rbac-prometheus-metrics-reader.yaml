{{- if and .Values.rbac.create .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
{{- with .Values.metrics.serviceMonitor.prometheus.serviceAccount -}}
# Binds the controller's metrics-reader ClusterRole (granting GET on the
# nonresource URL /metrics) to the Prometheus server's ServiceAccount, so
# the bearer token Prometheus presents during scrape is authorized by the
# metrics endpoint's TokenReview / SubjectAccessReview filter.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "image-patcher.fullname" $ }}-prometheus-metrics-reader
  labels:
    {{- include "image-patcher.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "image-patcher.fullname" $ }}-metrics-reader
subjects:
  - kind: ServiceAccount
    name: {{ .name }}
    namespace: {{ .namespace }}
{{- end }}
{{- end }}
