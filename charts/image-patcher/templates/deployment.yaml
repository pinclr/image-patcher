{{- include "image-patcher.assertNamespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-patcher.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-patcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "image-patcher.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "image-patcher.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "image-patcher.controllerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DEFAULT_IMAGE_REGISTRY
              value: {{ .Values.config.defaultImageRegistry | quote }}
            {{- with .Values.config.buildNamespace }}
            - name: BUILD_NAMESPACE
              value: {{ . | quote }}
            {{- end }}
            - name: KANIKO_IMAGE_NAME
              value: {{ include "image-patcher.kanikoImage" . | quote }}
            {{- if and .Values.kaniko.buildCache.enabled .Values.config.defaultImageRegistry }}
            # Append a /kaniko-build-cache sub-path so the cache-repo has at
            # least two path segments. Harbor (and OCI registries that share
            # its project/repo split) reject manifest writes when the path
            # is a single segment -- `defaultImageRegistry` alone is often
            # just `<registry>/<project>`, so writing manifests directly
            # under it returns 400.
            - name: KANIKO_BUILD_CACHE_REPO
              value: "{{ .Values.config.defaultImageRegistry }}/kaniko-build-cache"
            {{- end }}
            {{- with .Values.kaniko.buildOptions.snapshotMode }}
            - name: KANIKO_SNAPSHOT_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.kaniko.buildOptions.singleSnapshot }}
            - name: KANIKO_SINGLE_SNAPSHOT
              value: "true"
            {{- end }}
            {{- with .Values.kaniko.buildOptions.ignorePaths }}
            - name: KANIKO_IGNORE_PATHS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.kaniko.buildOptions.cacheTTL }}
            - name: KANIKO_CACHE_TTL
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.kaniko.resources.requests .Values.kaniko.resources.limits }}
            - name: KANIKO_RESOURCES
              value: {{ .Values.kaniko.resources | toJson | quote }}
            {{- end }}
            {{- if .Values.kaniko.registryMap }}
            # Comma-separated <target>=<mirror> pairs; the controller
            # emits one --registry-map=<target>=<mirror> Kaniko arg per
            # entry.
            - name: KANIKO_REGISTRY_MAP
              value: "{{- $first := true -}}{{- range $target, $mirror := .Values.kaniko.registryMap -}}{{- if not $first -}},{{- end -}}{{- $target -}}={{- $mirror -}}{{- $first = false -}}{{- end -}}"
            {{- end }}
            {{- with .Values.kaniko.buildAptMirror }}
            # Build-only apt mirror. The controller passes this to apt-get
            # via `-o Dir::Etc::SourceList=<tmpfile>` inside a single RUN,
            # so /etc/apt is never touched and the produced image carries
            # the base's stock apt sources. Speeds up apt-get install on
            # clusters where archive.ubuntu.com is slow or unreachable.
            - name: KANIKO_BUILD_APT_MIRROR
              value: {{ . | quote }}
            {{- end }}
            - name: DEDUP_ENABLED
              value: {{ .Values.dedup.enabled | quote }}
            {{- if .Values.dedup.enabled }}
            - name: REGISTRY_AUTH_CONFIG_PATH
              value: /registry/.docker/config.json
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: https
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.dedup.enabled }}
          volumeMounts:
            - name: registry-auth
              mountPath: /registry/.docker
              readOnly: true
          {{- end }}
      {{- if .Values.dedup.enabled }}
      volumes:
        - name: registry-auth
          secret:
            # image-registry-secret -- the same Opaque Secret Kaniko mounts
            # in the build namespace, holding docker config JSON under the
            # config.json key. Populated from registryCredentials (see
            # templates/registry-auth-secret.yaml) or provisioned
            # out-of-band. Must exist in the release namespace
            # ({{ .Release.Namespace }}); when the build namespace differs
            # (e.g. ysyb: controller in image-patch-system, builds in oms)
            # it must exist there too.
            secretName: {{ include "image-patcher.registryAuthSecretName" . | quote }}
            items:
              - key: config.json
                path: config.json
      {{- end }}
