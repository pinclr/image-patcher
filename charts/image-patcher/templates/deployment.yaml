{{- include "image-patcher.assertNamespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-patcher.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-patcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "image-patcher.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "image-patcher.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "image-patcher.controllerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DEFAULT_IMAGE_REGISTRY
              value: {{ .Values.config.defaultImageRegistry | quote }}
            {{- with .Values.config.buildNamespace }}
            - name: BUILD_NAMESPACE
              value: {{ . | quote }}
            {{- end }}
            - name: KANIKO_IMAGE_NAME
              value: {{ include "image-patcher.kanikoImage" . | quote }}
            {{- if and .Values.kaniko.buildCache.enabled .Values.config.defaultImageRegistry }}
            # Append a /kaniko-build-cache sub-path so the cache-repo has at
            # least two path segments. Harbor (and OCI registries that share
            # its project/repo split) reject manifest writes when the path
            # is a single segment -- `defaultImageRegistry` alone is often
            # just `<registry>/<project>`, so writing manifests directly
            # under it returns 400.
            - name: KANIKO_BUILD_CACHE_REPO
              value: "{{ .Values.config.defaultImageRegistry }}/kaniko-build-cache"
            {{- end }}
            {{- with .Values.kaniko.buildOptions.snapshotMode }}
            - name: KANIKO_SNAPSHOT_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.kaniko.buildOptions.singleSnapshot }}
            - name: KANIKO_SINGLE_SNAPSHOT
              value: "true"
            {{- end }}
            {{- with .Values.kaniko.buildOptions.ignorePaths }}
            - name: KANIKO_IGNORE_PATHS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.kaniko.buildOptions.cacheTTL }}
            - name: KANIKO_CACHE_TTL
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.kaniko.resources.requests .Values.kaniko.resources.limits }}
            - name: KANIKO_RESOURCES
              value: {{ .Values.kaniko.resources | toJson | quote }}
            {{- end }}
            {{- if .Values.kaniko.mirrors }}
            # Comma-separated <target>=<mirror> pairs; the controller
            # emits one --registry-map=<target>=<mirror> Kaniko arg per
            # entry.
            - name: KANIKO_REGISTRY_MIRRORS
              value: "{{- $first := true -}}{{- range $target, $mirror := .Values.kaniko.mirrors -}}{{- if not $first -}},{{- end -}}{{- $target -}}={{- $mirror -}}{{- $first = false -}}{{- end -}}"
            {{- end }}
            - name: DEDUP_ENABLED
              value: {{ .Values.dedup.enabled | quote }}
            {{- if .Values.dedup.enabled }}
            - name: REGISTRY_AUTH_CONFIG_PATH
              value: /registry/.docker/config.json
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: https
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.dedup.enabled }}
          volumeMounts:
            - name: registry-auth
              mountPath: /registry/.docker
              readOnly: true
          {{- end }}
      {{- if .Values.dedup.enabled }}
      volumes:
        - name: registry-auth
          secret:
            # Must exist in the release namespace ({{ .Release.Namespace }}).
            # The same Secret Kaniko mounts in the build namespace -- if
            # those are different namespaces (e.g. ysyb: controller in
            # image-patch-system, builds in oms), the operator must
            # provision it in both. The Secret is a generic Opaque holding
            # docker config JSON under a key whose name matches what
            # Kaniko expects (config.json by default, see
            # internal/controller/imagepatch_controller.go) -- NOT a
            # kubernetes.io/dockerconfigjson typed Secret, whose
            # auto-generated .dockerconfigjson key won't match.
            secretName: {{ .Values.dedup.dockerConfigSecret | quote }}
            items:
              - key: {{ .Values.dedup.dockerConfigSecretKey | quote }}
                path: config.json
      {{- end }}
