{{- include "image-patcher.assertNamespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-patcher.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-patcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "image-patcher.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "image-patcher.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "image-patcher.controllerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DEFAULT_IMAGE_REGISTRY
              value: {{ .Values.config.defaultImageRegistry | quote }}
            {{- with .Values.config.buildNamespace }}
            - name: BUILD_NAMESPACE
              value: {{ . | quote }}
            {{- end }}
            - name: KANIKO_IMAGE_NAME
              value: {{ include "image-patcher.kanikoImage" . | quote }}
            {{- if .Values.kaniko.pullCache.enabled }}
            - name: KANIKO_PULL_CACHE_PVC
              value: {{ default (printf "%s-kaniko-pull-cache" (include "image-patcher.fullname" .)) .Values.kaniko.pullCache.existingClaim | quote }}
            - name: KANIKO_PULL_CACHE_MOUNT_PATH
              value: {{ .Values.kaniko.pullCache.mountPath | quote }}
            {{- end }}
            {{- if and .Values.kaniko.buildCache.enabled .Values.kaniko.buildCache.repo }}
            - name: KANIKO_BUILD_CACHE_REPO
              value: {{ .Values.kaniko.buildCache.repo | quote }}
            {{- end }}
            {{- with .Values.kaniko.buildOptions.snapshotMode }}
            - name: KANIKO_SNAPSHOT_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.kaniko.buildOptions.singleSnapshot }}
            - name: KANIKO_SINGLE_SNAPSHOT
              value: "true"
            {{- end }}
            {{- with .Values.kaniko.buildOptions.ignorePaths }}
            - name: KANIKO_IGNORE_PATHS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.kaniko.buildOptions.cacheTTL }}
            - name: KANIKO_CACHE_TTL
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.kaniko.resources.requests .Values.kaniko.resources.limits }}
            - name: KANIKO_RESOURCES
              value: {{ .Values.kaniko.resources | toJson | quote }}
            {{- end }}
            {{- if .Values.dedup.enabled }}
            - name: DEDUP_REPO
              value: {{ required "dedup.repo is required when dedup.enabled" .Values.dedup.repo | quote }}
            - name: DEDUP_TAG_PREFIX
              value: {{ .Values.dedup.tagPrefix | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: https
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
