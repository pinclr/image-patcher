{{- if and .Values.rbac.create .Values.metrics.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "image-patcher.fullname" . }}-metrics-auth-role
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "image-patcher.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "image-patcher.fullname" . }}-metrics-auth-role
subjects:
  - kind: ServiceAccount
    name: {{ include "image-patcher.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
