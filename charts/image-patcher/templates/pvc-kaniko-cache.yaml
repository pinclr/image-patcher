{{- if and .Values.kaniko.cache.enabled (not .Values.kaniko.cache.existingClaim) -}}
# Shared pull-cache PVC mounted into every Kaniko build Job at
# .Values.kaniko.cache.mountPath. PVC lifecycle is tied to the chart release,
# not to any individual ImagePatch CR — so cached layers survive across
# patches and CRs being deleted.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "image-patcher.fullname" . }}-kaniko-cache
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
  # Helm preserves PVCs on uninstall by convention; the annotation makes that
  # explicit. Delete it manually to reclaim the storage.
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.kaniko.cache.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.kaniko.cache.size }}
{{- end }}
