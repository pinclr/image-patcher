{{- /*
Auto-populated registry auth Secret.

When .Values.registryCredentials is non-empty the chart builds a docker
config.json from the listed username/password pairs and provisions the
Secret itself -- no more hand-creating image-registry-secret with
`kubectl create secret`.

ONE Secret carries every registry's auth in a single "auths" map. It is
general-purpose, not push-only: Kaniko uses it for base-image pull, layer
cache, and the final push, and the dedup client reuses it for HEAD/retag.
Both pick the matching entry per registry, so different source/target
registries can each carry their own creds.

Naming: the Secret name (image-registry-secret) and data key (config.json)
are fixed -- the controller hard-codes the name for the build Job's
docker-config mount (internal/controller/imagepatch_controller.go,
defaultDockerAuthSecret) and mounts it with subPath config.json and no key
remapping. See the image-patcher.registryAuthSecretName helper.

Cross-namespace: the controller reads the Secret in the release namespace
(dedup) and Kaniko reads it in the build namespace. When config.buildNamespace
differs from the release namespace, an identical Secret is rendered into both.
*/ -}}
{{- if .Values.registryCredentials }}
{{- $key := "config.json" -}}
{{- $auths := dict -}}
{{- range $i, $cred := .Values.registryCredentials -}}
{{- if not $cred.registry }}{{ fail (printf "registryCredentials[%d]: registry is required" $i) }}{{ end -}}
{{- if not $cred.username }}{{ fail (printf "registryCredentials[%d] (%s): username is required" $i $cred.registry) }}{{ end -}}
{{- if not $cred.password }}{{ fail (printf "registryCredentials[%d] (%s): password is required" $i $cred.registry) }}{{ end -}}
{{- $auth := printf "%s:%s" $cred.username $cred.password | b64enc -}}
{{- $_ := set $auths $cred.registry (dict "username" $cred.username "password" $cred.password "auth" $auth) -}}
{{- end -}}
{{- $config := dict "auths" $auths | toJson -}}
{{- $namespaces := list .Release.Namespace -}}
{{- if and .Values.config.buildNamespace (ne .Values.config.buildNamespace .Release.Namespace) -}}
{{- $namespaces = append $namespaces .Values.config.buildNamespace -}}
{{- end -}}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "image-patcher.registryAuthSecretName" $ | quote }}
  namespace: {{ $ns | quote }}
  labels:
    {{- include "image-patcher.labels" $ | nindent 4 }}
type: Opaque
data:
  {{ $key }}: {{ $config | b64enc }}
{{- end }}
{{- end }}
