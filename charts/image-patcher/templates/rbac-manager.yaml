{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-role
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # pods + pods/log are read by classifyBuildFailure -- the reconciler
  # tails the Kaniko build Pod's last ~200 log lines and keyword-matches
  # the kaniko/apt/curl error block to write a user-facing failure
  # category (BaseImageNotFound / AuthorizationNeeded / NetworkError /
  # ControllerInternalError) into ImagePatch.Status.Message. Without
  # this access the classifier silently degrades to
  # ControllerInternalError, mis-blaming us for what is often a
  # bad-input failure. Keep in sync with the kubebuilder markers in
  # internal/controller/imagepatch_controller.go and config/rbac/role.yaml.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches/finalizers"]
    verbs: ["update"]
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-rolebinding
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "image-patcher.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "image-patcher.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
