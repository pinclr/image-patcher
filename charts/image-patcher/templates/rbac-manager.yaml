{{- if .Values.rbac.create -}}
# ImagePatch CRs may be created in any namespace, so the controller
# needs cluster-wide access to the CR itself. Every other resource it
# touches (build Job, supporting ConfigMap, synthesized docker-auth
# Secret, push/pull Secret reads, Pod / Pod log reads) is confined to
# image-patch-system (the build namespace, == .Release.Namespace), so
# those rules live in the namespaced Role/RoleBinding below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-role
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches/finalizers"]
    verbs: ["update"]
  - apiGroups: ["oms.ogpu.cloud"]
    resources: ["imagepatches/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-rolebinding
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "image-patcher.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "image-patcher.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped role for build resources. The manager cache in
# cmd/main.go is configured with cache.Options.ByObject so the
# ConfigMap / Secret / Job informers only list/watch this namespace --
# without that scoping the informer would 403 on cluster-wide list
# and the controller would never finish cache sync at boot.
#
# deletecollection is required (not just delete) because the
# MSP-117 finalizer uses client.DeleteAllOf to tear down build
# resources by source label; K8s checks the collection-DELETE
# endpoint as a distinct verb from delete. Keep in sync with
# config/rbac/role.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  # secrets: read for the CR's pullSecret/pushSecret in the pre-flight
  # platform inspect, written to synthesize the per-CR <name>-docker-auth
  # Secret that layers pull creds over push creds for Kaniko to mount
  # ([MSP-104]). All reads/writes happen in the build namespace --
  # spec.pullSecret / spec.pushSecret name a Secret that must live here,
  # not in the CR's own namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  # pods + pods/log are read by classifyBuildFailure -- the reconciler
  # tails the Kaniko build Pod's last ~200 log lines and keyword-matches
  # the kaniko/apt/curl error block to write a user-facing failure
  # category (BaseImageNotFound / AuthorizationNeeded / NetworkError /
  # ControllerInternalError) into ImagePatch.Status.Message. The build
  # Pod is owned by the Job, so it lives here too.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "image-patcher.fullname" . }}-manager-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-patcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "image-patcher.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "image-patcher.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
