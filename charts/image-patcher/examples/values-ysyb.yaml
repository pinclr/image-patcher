# Example values for the "ysyb" environment.
#
# Build the controller image and push to the private registry first:
#   make docker-build docker-push IMAGE_REGISTRY=registry.luna.ogpu.cloud
#
# Then install the chart:
#   helm install image-patch ./charts/image-patcher \
#     -n image-patch-system --create-namespace \
#     -f charts/image-patcher/examples/values-ysyb.yaml

image:
  registry: registry.luna.ogpu.cloud
  # repository defaults to image-patch-system/image-patch-operator
  # tag defaults to .Chart.AppVersion (kept in sync with the build)

kaniko:
  image:
    registry: registry.luna.ogpu.cloud
    repository: image-patch-system/kaniko-executor
    # tag defaults to v1.23.2

  # Pull cache (base-image layers): chart-managed PVC mounted into every
  # build Job as Kaniko's --cache-dir. RWX is required so concurrent build
  # Jobs across different nodes can share the same cache -- we back it with
  # CephFS. Lives in config.buildNamespace alongside the Jobs.
  pullCache:
    enabled: true
    storageClassName: ceph-filesystem
    size: 100Gi
    mountPath: /cache
    # Nightly CronJob prunes cache files older than 30 days so the RWX PVC
    # doesn't fill up (Kaniko itself never evicts).
    cleanup:
      enabled: true

  # Build cache (intermediate RUN layers): pushed/pulled from a container
  # registry via --cache=true --cache-repo=<repo>. Multi-node safe by
  # construction (registry handles concurrency). Independent of pullCache;
  # both are enabled together here.
  buildCache:
    enabled: true
    repo: registry.luna.ogpu.cloud/image-patch-system/kaniko-build-cache

config:
  defaultImageRegistry: registry.luna.ogpu.cloud/patched-images
  # All Kaniko build Jobs (and the chart-managed pull-cache PVC) land in
  # `oms`, regardless of which namespace the ImagePatch CR itself lives in.
  # See values.yaml for the cross-namespace owner-reference caveats.
  buildNamespace: oms

# This cluster runs kube-prometheus-stack in the `monitoring` namespace
# under the SA `k8s-prometheus` (not the upstream default
# `prometheus-kube-prometheus-prometheus`). Enable the chart's
# ServiceMonitor and point the ClusterRoleBinding at the real SA so
# Prometheus's bearer token is authorized for the metrics endpoint.
metrics:
  serviceMonitor:
    enabled: true
    # Prometheus CR k8s-prometheus has serviceMonitorSelector
    # matchLabels: {release: kube-prometheus-stack}, so the ServiceMonitor
    # must carry that label to be discovered.
    labels:
      release: kube-prometheus-stack
    prometheus:
      serviceAccount:
        name: k8s-prometheus
        namespace: monitoring

# kube-prometheus-stack grafana sidecar runs with NAMESPACE=ALL and the
# default label (grafana_dashboard=1), so the bundled dashboard
# ConfigMap is picked up automatically from this release's namespace.
dashboards:
  enabled: true
