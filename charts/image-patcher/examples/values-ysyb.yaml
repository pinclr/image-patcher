# Example values for the "ysyb" environment.
#
# Build the controller image and push to the private registry first:
#   make docker-build docker-push IMAGE_REGISTRY=registry.luna.ogpu.cloud
#
# Then install the chart:
#   helm install image-patch ./charts/image-patcher \
#     -n image-patch-system --create-namespace \
#     -f charts/image-patcher/examples/values-ysyb.yaml

image:
  registry: registry.luna.ogpu.cloud
  # This private registry namespaces repos under a project, so override the
  # flat chart default with the image-patch-system/ prefix used at build time.
  repository: image-patch-system/image-patcher-operator
  # tag defaults to .Chart.AppVersion (kept in sync with the build)

replicaCount: 3
resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 10m
    memory: 128Mi

kaniko:
  image:
    registry: registry.luna.ogpu.cloud
    repository: image-patch-system/kaniko-executor
    # tag defaults to v1.23.2

  # Build cache (intermediate RUN layers): pushed/pulled from a container
  # registry via --cache=true --cache-repo=<repo>. The cache repo is
  # automatically set to config.defaultImageRegistry. Multi-node safe by
  # construction (registry handles concurrency).
  buildCache:
    enabled: true

  # Build-time tuning for this environment's ML/CUDA workloads. `redo`
  # snapshot mode cuts snapshot-scan time 5-10x on large bases at a
  # small risk of missing changes from unusual write patterns -- safe
  # for our patch shapes (apt/pip/shell). singleSnapshot is left off
  # because we DO want per-RUN build-cache reuse across repeated
  # builds.
  #
  # ignorePaths intentionally NOT set: tried /var/cache/apt,
  # /var/lib/apt/lists, /root/.cache/pip, /tmp and hit
  #     "Couldn't create temporary file /tmp/apt.conf.XXX for
  #     passing config to apt-key"
  # during apt-get update -- apt-key needs to write to /tmp at
  # build time, and Kaniko's --ignore-path makes the path
  # effectively unusable for writes (despite the docs framing it
  # as snapshot-only). The other three paths are similarly
  # write-targets during apt/pip install. Until we have a path
  # that's truly write-free during build (rare), skip ignorePaths
  # and rely on snapshotMode=redo for the bulk of the speedup.
  buildOptions:
    snapshotMode: redo

  # Pull-through mirrors for base image fetches. Build pods on this
  # cluster can't reach docker.io / gcr.io / etc. directly, but the
  # DaoCloud public mirror covers all five upstreams we currently
  # pull from. Emitted as --registry-map=<target>=<mirror> per entry.
  mirrors:
    docker.io: docker.m.daocloud.io
    gcr.io: gcr.m.daocloud.io
    registry.k8s.io: k8s.m.daocloud.io
    quay.io: quay.m.daocloud.io
    ghcr.io: ghcr.m.daocloud.io

# Content-addressed dedup: enabled. Same-repo tag write happens in
# Kaniko (multi-destination push) and the controller HEADs the dedup
# tag before creating each Job; on hit it retags the existing manifest
# and skips Kaniko entirely. See values.yaml for the cross-namespace
# caveat -- image-registry-secret must exist in image-patch-system
# (controller's ns), not only in oms (build ns where Kaniko mounts it).
dedup:
  enabled: true

config:
  defaultImageRegistry: registry.luna.ogpu.cloud/patched-images
  # All Kaniko build Jobs land in default ns `image-patch-system`.
  buildNamespace: image-patch-system

# This cluster runs kube-prometheus-stack in the `monitoring` namespace
# under the SA `k8s-prometheus` (not the upstream default
# `prometheus-kube-prometheus-prometheus`). Enable the chart's
# ServiceMonitor and point the ClusterRoleBinding at the real SA so
# Prometheus's bearer token is authorized for the metrics endpoint.
metrics:
  serviceMonitor:
    enabled: true
    # Prometheus CR k8s-prometheus has serviceMonitorSelector
    # matchLabels: {release: kube-prometheus-stack}, so the ServiceMonitor
    # must carry that label to be discovered.
    labels:
      release: kube-prometheus-stack
    prometheus:
      serviceAccount:
        name: k8s-prometheus
        namespace: monitoring

# kube-prometheus-stack grafana sidecar runs with NAMESPACE=ALL and the
# default label (grafana_dashboard=1), so the bundled dashboard
# ConfigMap is picked up automatically from this release's namespace.
dashboards:
  enabled: true

# Synthetic canary: every 30min, walk the 4-case cache-tier matrix
# against multiple Ubuntu bases. Higher cadence than the chart
# default (hourly) but lighter than once-every-10min -- 4 bases x 4
# cases sequentially per tick is already heavy (~one build every
# 2min average during a tick window), and 30min cadence gives the
# registry's retention room to breathe between bursts.
healthcheck:
  enabled: true
  schedule: "*/10 * * * *"
  # kubectl image mirrored into the private registry so we don't depend
  # on docker.io reachability per probe run.
  image: registry.luna.ogpu.cloud/image-patch-system/kubectl:1.31
  # Internal bases; docker.io is blocked from build pods on this
  # cluster (cluster DNS returns SERVFAIL for index.docker.io and
  # image-registry-secret only carries creds for luna + ACR).
  # The noble (24.04) base exercises the deb822 sources.list.d
  # codepath (#27); 26.04 may not be published yet -- expected to
  # show as [FAIL] case-ubuntu-26.04-first until the base ref
  # exists, and that failure is the signal.
  baseImages:
    - registry.luna.ogpu.cloud/luna/ubuntu-22.04:latest
    - registry.luna.ogpu.cloud/luna/ubuntu:24.04
    - registry.luna.ogpu.cloud/luna/ubuntu:20.04
    - registry.luna.ogpu.cloud/luna/ubuntu:26.04
  targetImage: registry.luna.ogpu.cloud/image-patch-system/healthcheck-noop:latest
