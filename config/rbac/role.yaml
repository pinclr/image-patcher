---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oms.oms.ogpu.cloud
  resources:
  - imagepatches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oms.oms.ogpu.cloud
  resources:
  - imagepatches/finalizers
  verbs:
  - update
- apiGroups:
  - oms.oms.ogpu.cloud
  resources:
  - imagepatches/status
  verbs:
  - get
  - patch
  - update
