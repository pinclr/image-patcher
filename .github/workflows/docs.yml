name: docs

on:
  push:
    branches:
      - main
      - dev/robert/msp-21-deploy-imagepatcher-site
    paths:
      - docs/website/**
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: build and deploy docs to OSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/website/package-lock.json

      - name: install dependencies
        working-directory: docs/website
        run: npm ci

      - name: build
        working-directory: docs/website
        run: npm run build

      - name: install ossutil
        run: |
          curl -sSL https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64 -o ossutil
          chmod +x ossutil

      - name: upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ./ossutil cp -r docs/website/dist/ oss://imagepatcher/ \
            -e oss-cn-beijing.aliyuncs.com \
            -i "$OSS_ACCESS_KEY_ID" \
            -k "$OSS_ACCESS_KEY_SECRET" \
            --force \
            --update
