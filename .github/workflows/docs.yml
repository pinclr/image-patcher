name: docs

on:
  push:
    branches:
      - main
      - dev/robert/msp-21-deploy-imagepatcher-site
    paths:
      - docs/website/**
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: build and deploy docs to OSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/website/package-lock.json

      - name: install dependencies
        working-directory: docs/website
        run: npm install

      - name: build
        working-directory: docs/website
        run: npm run build

      - name: upload to OSS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          AWS_DEFAULT_REGION: cn-beijing
        run: |
          aws s3 sync docs/website/dist/ s3://imagepatcher/ \
            --endpoint-url https://oss-cn-beijing.aliyuncs.com \
            --delete
