name: docs

on:
  push:
    branches:
      - main
    paths:
      - docs/website/**
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: build and deploy docs to OSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/website/package-lock.json

      - name: install dependencies
        working-directory: docs/website
        run: npm install

      - name: build
        working-directory: docs/website
        run: npm run build

      - name: install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: upload hashed assets to OSS (long-lived cache)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          rclone sync docs/website/dist/_astro/ :s3:imagepatcher/_astro/ \
            --s3-provider Alibaba \
            --s3-endpoint oss-cn-beijing.aliyuncs.com \
            --s3-access-key-id "$OSS_ACCESS_KEY_ID" \
            --s3-secret-access-key "$OSS_ACCESS_KEY_SECRET" \
            --s3-acl public-read \
            --header-upload "Cache-Control: public, max-age=31536000, immutable"

      - name: upload pages to OSS (no-cache, filenames are reused across deploys)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          rclone sync docs/website/dist/ :s3:imagepatcher \
            --exclude "_astro/**" \
            --s3-provider Alibaba \
            --s3-endpoint oss-cn-beijing.aliyuncs.com \
            --s3-access-key-id "$OSS_ACCESS_KEY_ID" \
            --s3-secret-access-key "$OSS_ACCESS_KEY_SECRET" \
            --s3-acl public-read \
            --header-upload "Cache-Control: no-cache"
