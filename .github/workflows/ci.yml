name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# These jobs run on self-hosted runners inside China, where the default
# proxy.golang.org / sum.golang.org are slow-to-unreachable -- a partial
# fetch yields corrupted module bits that fail `go.sum` verification
# (checksum mismatch). Pin the China-local mirrors for every host-level Go
# invocation (go vet/build, make test, golangci-lint, controller-gen).
# Mirrors the Dockerfile's settings: goproxy.cn is Qiniu's mirror of
# proxy.golang.org; sum.golang.google.cn is Google's official mirror of
# sum.golang.org, so checksum verification stays cryptographically equivalent.
env:
  GOPROXY: https://goproxy.cn,direct
  GOSUMDB: sum.golang.google.cn

jobs:
  go-test:
    name: go test
    runs-on: [self-hosted, imagepatcher, build]
    steps:
      # The self-hosted runner's workspace persists between runs, and
      # `make test` extracts envtest binaries into bin/k8s with read-only
      # dirs (0555). actions/checkout's `git clean -ffdx` then can't unlink
      # them (EACCES) and the job dies at checkout before our code runs.
      # Make the leftovers writable first; an absent dir is a no-op. Runs
      # in the persistent workspace path, which exists prior to checkout.
      - name: make stale envtest binaries deletable
        run: chmod -R u+w "${{ github.workspace }}/bin/k8s" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: make test

  golangci:
    name: golangci-lint
    runs-on: [self-hosted, imagepatcher, build]
    steps:
      # The self-hosted runner's workspace persists between runs, and
      # `make test` extracts envtest binaries into bin/k8s with read-only
      # dirs (0555). actions/checkout's `git clean -ffdx` then can't unlink
      # them (EACCES) and the job dies at checkout before our code runs.
      # Make the leftovers writable first; an absent dir is a no-op. Runs
      # in the persistent workspace path, which exists prior to checkout.
      - name: make stale envtest binaries deletable
        run: chmod -R u+w "${{ github.workspace }}/bin/k8s" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2

  helm:
    name: helm chart
    runs-on: [self-hosted, imagepatcher, build]
    steps:
      # The self-hosted runner's workspace persists between runs, and
      # `make test` extracts envtest binaries into bin/k8s with read-only
      # dirs (0555). actions/checkout's `git clean -ffdx` then can't unlink
      # them (EACCES) and the job dies at checkout before our code runs.
      # Make the leftovers writable first; an absent dir is a no-op. Runs
      # in the persistent workspace path, which exists prior to checkout.
      - name: make stale envtest binaries deletable
        run: chmod -R u+w "${{ github.workspace }}/bin/k8s" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: helm lint (with example values)
        run: helm lint charts/image-patcher -f charts/image-patcher/examples/values-example.yaml

      - name: helm template (with example values)
        run: |
          helm template image-patch charts/image-patcher \
            -n image-patch-system \
            -f charts/image-patcher/examples/values-example.yaml \
            > /tmp/rendered.yaml

      - name: schema rejects bare install
        run: |
          if helm template image-patch charts/image-patcher -n image-patch-system > /dev/null 2>&1; then
            echo "::error::values.schema.json failed to reject defaults; image.registry should be required"
            exit 1
          fi

      - name: install kubeconform
        # Job-scoped dir on the self-hosted runner -- no sudo required, and
        # cleaned automatically between runs by GHA. ${{ runner.temp }} is
        # always writable for the runner user.
        run: |
          curl -sSL -o "${{ runner.temp }}/kubeconform.tar.gz" \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf "${{ runner.temp }}/kubeconform.tar.gz" -C "${{ runner.temp }}" kubeconform

      - name: kubeconform validate rendered manifests
        run: '${{ runner.temp }}/kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered.yaml'

  crd-drift:
    name: CRD drift
    runs-on: [self-hosted, imagepatcher, build]
    steps:
      # The self-hosted runner's workspace persists between runs, and
      # `make test` extracts envtest binaries into bin/k8s with read-only
      # dirs (0555). actions/checkout's `git clean -ffdx` then can't unlink
      # them (EACCES) and the job dies at checkout before our code runs.
      # Make the leftovers writable first; an absent dir is a no-op. Runs
      # in the persistent workspace path, which exists prior to checkout.
      - name: make stale envtest binaries deletable
        run: chmod -R u+w "${{ github.workspace }}/bin/k8s" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: regenerate manifests and sync to chart
        run: make sync-crds

      - name: fail if chart's CRD differs from controller-gen output
        run: |
          if ! git diff --exit-code -- config/crd/bases charts/image-patcher/crds; then
            echo "::error::CRD has drifted from controller-gen output. Run 'make sync-crds' and commit the result."
            exit 1
          fi
