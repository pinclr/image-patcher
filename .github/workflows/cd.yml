name: cd

on:
  push:
    branches:
      - main
      # TODO(MSP-46): remove this entry before merging. Temporarily included
      # so we can validate the CD pipeline end-to-end (self-hosted runner,
      # docker push, ChartMuseum upload) without first merging to main.
      - dev/robert/msp-46-metrics-spec
  workflow_dispatch:

# Only one release at a time per ref; cancel any in-flight run so the latest commit wins.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: publish image + chart
    runs-on: [self-hosted, imagepatcher, build]
    steps:
      - uses: actions/checkout@v4

      # Make sure the build toolchain the rest of this workflow expects is on
      # PATH, and that rootless podman has a valid user-namespace mapping.
      # Idempotent — each block skips when already in the right state. Assumes
      # a Debian/Ubuntu-family runner; swap apt-get for dnf/yum if the runner
      # image ever changes distros.
      - name: ensure make and podman are installed
        run: |
          missing=()
          command -v make >/dev/null    || missing+=(make)
          command -v podman >/dev/null  || missing+=(podman)
          command -v uidmap >/dev/null  || command -v newuidmap >/dev/null || missing+=(uidmap)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "installing: ${missing[*]}"
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "build deps already installed"
          fi
          make --version | head -n1
          podman --version

          # Rootless podman requires the runner user to own a subuid/subgid
          # range so newuidmap/newgidmap can wire up the build's user namespace.
          # Without these entries the first podman build fails with:
          #   Error: cannot setup namespace using newuidmap: exit status 1
          user="$(id -un)"
          if ! grep -q "^${user}:" /etc/subuid; then
            echo "registering subuid/subgid range for ${user}"
            echo "${user}:100000:65536" | sudo tee -a /etc/subuid
            echo "${user}:100000:65536" | sudo tee -a /etc/subgid
            podman system migrate || true
          else
            echo "subuid/subgid range for ${user} already registered"
          fi

      - name: build and push controller image
        env:
          IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}
        run: |
          if [ -z "$IMAGE_REGISTRY" ]; then
            echo "::error::IMAGE_REGISTRY repo secret is not set"
            exit 1
          fi
          make docker-build docker-push \
            IMAGE_REGISTRY="$IMAGE_REGISTRY" \
            CONTAINER_TOOL=podman

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: package helm chart
        run: |
          mkdir -p /tmp/charts
          helm package charts/image-patcher -d /tmp/charts
          ls -l /tmp/charts

      # ChartMuseum accepts an overwrite via ?force=true when the server is
      # started with ALLOW_FORCE_OVERWRITE=true. Every main push republishes
      # the same chart version (Chart.yaml's version is the release contract),
      # so overwrite is intentional.
      - name: push chart to ChartMuseum
        env:
          CHARTMUSEUM_URL: ${{ secrets.CHARTMUSEUM_URL }}
          CHARTMUSEUM_USERNAME: ${{ secrets.CHARTMUSEUM_USERNAME }}
          CHARTMUSEUM_PASSWORD: ${{ secrets.CHARTMUSEUM_PASSWORD }}
        run: |
          for v in CHARTMUSEUM_URL CHARTMUSEUM_USERNAME CHARTMUSEUM_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::$v repo secret is not set"
              exit 1
            fi
          done

          chart_tgz=$(ls /tmp/charts/image-patcher-*.tgz | head -n1)
          if [ -z "$chart_tgz" ]; then
            echo "::error::no packaged chart found in /tmp/charts"
            exit 1
          fi
          echo "uploading $chart_tgz to ${CHARTMUSEUM_URL%/}"

          http_code=$(curl -sS -o /tmp/cm.resp -w '%{http_code}' \
            -u "$CHARTMUSEUM_USERNAME:$CHARTMUSEUM_PASSWORD" \
            --data-binary "@$chart_tgz" \
            "${CHARTMUSEUM_URL%/}/api/charts?force=true")
          echo "ChartMuseum responded: HTTP $http_code"
          cat /tmp/cm.resp || true
          case "$http_code" in
            2*) ;;
            *) exit 1 ;;
          esac
