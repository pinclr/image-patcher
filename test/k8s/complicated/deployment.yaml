---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubuntu-complicated
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubuntu-complicated
  template:
    metadata:
      labels:
        app: ubuntu-complicated
    spec:
      containers:
        - name: ubuntu-complicated
          image: registry.luna.ogpu.cloud/patched-images/pytorch-2.7.1-cuda12.8-cudnn9-patch:latest
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
                - MKNOD
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          ports:
            - containerPort: 22
          volumeMounts:
            - name: authorized-keys
              mountPath: /root/.ssh/authorized_keys
              subPath: authorized_keys
            - name: authorized-keys
              mountPath: /root/.ssh/authorized_keys2
              subPath: authorized_keys2
            - name: containers-storage
              mountPath: /root/.cache/containers
            - name: podman-auth
              mountPath: /etc/containers/auth.json
              subPath: config.json
      volumes:
        - name: authorized-keys
          secret:
            secretName: ssh-key-secret
            defaultMode: 0600
        - name: containers-storage
          emptyDir: {}
        - name: podman-auth
          secret:
            secretName: image-registry-secret
            defaultMode: 0664
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
